<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Red MD - Pairing | 8-Digit Code</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Share Tech Mono', 'Space Mono', 'Courier New', monospace;
            overflow-x: hidden;
            color: #00ff41;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
        }
        
        /* Canvas for Particles */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
        }
        
        /* Shooting Stars */
        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: linear-gradient(45deg, #ff0000, #ff3333, #ff6666);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
            animation: shootStar linear infinite;
            z-index: 1;
            opacity: 0;
        }
        
        @keyframes shootStar {
            0% {
                transform: translateX(0) translateY(0) rotate(45deg);
                opacity: 1;
            }
            100% {
                transform: translateX(-400px) translateY(400px) rotate(45deg);
                opacity: 0;
            }
        }
        
        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 550px;
            margin: 50px auto;
            padding: 20px;
        }
        
        /* Hacker Style Glass Card */
        .glass-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1);
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.5));
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 1.8rem;
            font-family: 'Share Tech Mono', monospace;
            font-style: italic;
            font-weight: 700;
            background: linear-gradient(135deg, #ff0000, #ff3333, #ff6666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        
        .header p {
            font-size: 0.8rem;
            font-style: italic;
            opacity: 0.7;
            margin-top: 8px;
            color: #00ff41;
        }
        
        /* Darkness Code Box */
        .darkness-code {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 0, 0.5);
            text-align: center;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        
        .darkness-code p {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #ff0000;
            margin-bottom: 10px;
        }
        
        .code-display {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-style: italic;
            background: linear-gradient(135deg, #00ff41, #00cc33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-style: italic;
            font-size: 0.85rem;
            color: #00ff41;
        }
        
        input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            font-size: 1rem;
            color: #00ff41;
            font-family: 'Space Mono', monospace;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }
        
        input::placeholder {
            color: rgba(0, 255, 65, 0.3);
            font-style: italic;
        }
        
        small {
            display: block;
            margin-top: 5px;
            font-size: 0.7rem;
            opacity: 0.6;
            font-style: italic;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: #00ff41;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Share Tech Mono', monospace;
            font-style: italic;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
            color: #ffffff;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Message Styles */
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-family: 'Space Mono', monospace;
            font-style: italic;
            font-size: 0.85rem;
        }
        
        .message.success {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            color: #00ff41;
            display: block;
        }
        
        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff0000;
            color: #ff6666;
            display: block;
        }
        
        /* Session Info */
        .session-info {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 255, 65, 0.05);
            border-radius: 12px;
            border: 1px solid #00ff41;
        }
        
        .session-info strong {
            color: #00ff41;
            font-size: 0.9rem;
        }
        
        .session-id {
            font-family: monospace;
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            word-break: break-all;
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.3);
        }
        
        .copy-btn, .back-btn {
            width: auto;
            padding: 10px 20px;
            margin: 5px;
            font-size: 0.8rem;
            display: inline-block;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Share Tech Mono', monospace;
            font-style: italic;
            text-decoration: none;
            text-align: center;
        }
        
        .copy-btn {
            background: #008800;
            color: #00ff41;
        }
        
        .copy-btn:hover {
            background: #00aa00;
            transform: translateY(-2px);
        }
        
        .back-btn {
            background: #333333;
            color: #00ff41;
        }
        
        .back-btn:hover {
            background: #444444;
            transform: translateY(-2px);
        }
        
        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .social-link {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            color: #00ff41;
            font-size: 0.75rem;
            font-style: italic;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 255, 65, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .social-link:hover {
            border-color: #ff0000;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        
        .social-link svg {
            width: 16px;
            height: 16px;
        }
        
        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 255, 65, 0.3);
            border-radius: 50%;
            border-top-color: #00ff41;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .container { margin: 20px auto; padding: 15px; }
            .glass-card { padding: 25px; }
            .code-display { font-size: 1.5rem; letter-spacing: 4px; }
            .header h1 { font-size: 1.3rem; }
        }
    </style>
</head>

    <script>
        // ========== SLOW PARTICLE SYSTEM & SHOOTING STARS ==========
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        let particles = [];
        let stars = [];
        let redLines = [];
        let shootingStars = [];
        
        canvas.width = width;
        canvas.height = height;
        
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.z = Math.random() * 100;
                this.size = Math.random() * 2 + 0.3;
                this.speedX = (Math.random() - 0.5) * 0.12;
                this.speedY = (Math.random() - 0.5) * 0.12;
                this.color = `rgba(255, ${Math.random() * 50 + 50}, ${Math.random() * 50}, ${Math.random() * 0.5 + 0.3})`;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.z -= 0.2;
                if (this.z < 0) this.z = 100;
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
                if (this.y > height) this.y = 0;
                if (this.y < 0) this.y = height;
            }
            
            draw() {
                const scale = 0.8 + (this.z / 100) * 0.5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * scale, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(255, 0, 0, 0.2)';
            }
        }
        
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 1.2;
                this.twinkle = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.03;
            }
            
            draw() {
                const brightness = 0.3 + Math.sin(this.twinkle) * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.fill();
                this.twinkle += this.speed;
            }
        }
        
        class RedLine {
            constructor(x1, y1, x2, y2) {
                this.x1 = x1;
                this.y1 = y1;
                this.x2 = x2;
                this.y2 = y2;
                this.life = 1;
            }
            
            draw() {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.moveTo(this.x1, this.y1);
                ctx.lineTo(this.x2, this.y2);
                ctx.strokeStyle = `rgba(255, 0, 0, ${this.life * 0.12})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
                this.life -= 0.008;
            }
        }
        
        class ShootingStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.5;
                this.length = Math.random() * 80 + 40;
                this.speedX = - (Math.random() * 5 + 3);
                this.speedY = Math.random() * 4 + 2;
                this.opacity = 0.8;
                this.active = true;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.01;
                if (this.x < -100 || this.y > height + 100 || this.opacity <= 0) {
                    this.active = false;
                }
            }
            
            draw() {
                if (!this.active) return;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.length, this.y - this.length * 0.5);
                ctx.strokeStyle = `rgba(255, 50, 50, ${this.opacity * 0.7})`;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 80, 80, ${this.opacity})`;
                ctx.fill();
            }
        }
        
        for (let i = 0; i < 70; i++) particles.push(new Particle());
        for (let i = 0; i < 120; i++) stars.push(new Star());
        
        function createRedLines() {
            const newLines = [];
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 70 && distance > 20) {
                        newLines.push(new RedLine(particles[i].x, particles[i].y, particles[j].x, particles[j].y));
                    }
                }
            }
            return newLines;
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            stars.forEach(star => star.draw());
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            redLines = redLines.filter(line => line.life > 0);
            redLines.forEach(line => line.draw());
            
            if (Math.random() < 0.05) {
                const newLines = createRedLines();
                redLines.push(...newLines);
            }
            
            if (Math.random() < 0.02 && shootingStars.length < 5) {
                shootingStars.push(new ShootingStar());
            }
            
            shootingStars = shootingStars.filter(star => star.active);
            shootingStars.forEach(star => {
                star.update();
                star.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });
        
        animate();
        
        // ========== PAIRING CODE FUNCTIONALITY ==========
        const pairForm = document.getElementById('pairForm');
        const phoneNumberInput = document.getElementById('phoneNumber');
        const pairBtn = document.getElementById('pairBtn');
        const codeDisplay = document.getElementById('codeDisplay');
        const messageDiv = document.getElementById('message');
        const sessionInfoDiv = document.getElementById('sessionInfo');
        const sessionIdSpan = document.getElementById('sessionId');
        const copySessionBtn = document.getElementById('copySessionBtn');
        
        function generateRandomCode() {
            return Math.floor(10000000 + Math.random() * 90000000).toString();
        }
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 4000);
        }
        
        pairForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            let phoneNumber = phoneNumberInput.value.trim();
            
            if (!phoneNumber) {
                showMessage('❌ Please enter your WhatsApp number', 'error');
                return;
            }
            
            const phoneRegex = /^[0-9]{10,15}$/;
            if (!phoneRegex.test(phoneNumber.replace(/[^0-9]/g, ''))) {
                showMessage('❌ Invalid phone number (10-15 digits only)', 'error');
                return;
            }
            
            pairBtn.disabled = true;
            pairBtn.innerHTML = 'GENERATING CODE<span class="loading"></span>';
            
            setTimeout(() => {
                const pairCode = generateRandomCode();
                codeDisplay.textContent = pairCode;
                codeDisplay.style.animation = 'fadeInUp 0.5s ease';
                
                const sessionId = 'RMD_' + Math.random().toString(36).substring(2, 15).toUpperCase();
                sessionIdSpan.textContent = sessionId;
                sessionInfoDiv.style.display = 'block';
                
                showMessage('✓ Code generated successfully!', 'success');
                
                pairBtn.disabled = false;
                pairBtn.innerHTML = 'GENERATE CODE';
            }, 1500);
        });
        
        copySessionBtn.addEventListener('click', () => {
            const sessionText = sessionIdSpan.textContent;
            navigator.clipboard.writeText(sessionText).then(() => {
                showMessage('✓ Session ID copied to clipboard!', 'success');
            }).catch(() => {
                alert('Session ID: ' + sessionText);
            });
        });
        
        // Clear message on input
        phoneNumberInput.addEventListener('input', () => {
            if (messageDiv.style.display !== 'none') {
                messageDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
